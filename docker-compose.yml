version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/kepegawaian.db
      - JWT_SECRET=sangat_rahasia_sekali_123!@#
      - JWT_REFRESH_SECRET=rahasia_refresh_token_xyz_987
      - CORS_ORIGIN=http://localhost,http://127.0.0.1,http://localhost:5173
    volumes:
      - db-data:/data
      - upload-data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  upload-data:
